version: "3.8"

services:
  db:
    image: mysql:8
    container_name: mysql_db
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: nextjs
      MYSQL_DATABASE: nextjsdb
      MYSQL_USER: nextjs
      MYSQL_PASSWORD: nextjs
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
      timeout: 5s

  nextjs:
    build: .
    container_name: next_ssr
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      DATABASE_URL: mysql://nextjs:nextjs@db:3306/nextjsdb

volumes:
  mysql_data:
